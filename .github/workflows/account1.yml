name: Account1 Post (machiru731)

on:
  schedule:
    - cron: '0 22 * * *'   # 朝  7:00 JST
    - cron: '0 3 * * *'    # 昼 12:00 JST
    - cron: '0 9 * * *'    # 夜 18:00 JST
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Random delay
        run: |
          DELAY=$((RANDOM % 300))
          echo "Waiting ${DELAY}s..."
          sleep $DELAY

      - name: Post Account1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ACCOUNT1_THREADS_ACCESS_TOKEN: ${{ secrets.ACCOUNT1_THREADS_ACCESS_TOKEN }}
          ACCOUNT1_THREADS_USER_ID: ${{ secrets.ACCOUNT1_THREADS_USER_ID }}
          ACCOUNT1_NICHE: "テクノロジー"
          ACCOUNT1_TONE: "カジュアルで知的"
          ACCOUNT1_TOPICS: "音楽,サッカー,生活"
        run: python post_once.py ACCOUNT1